<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fluid Dynamics Simulator</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#05060b}
canvas{display:block;width:100vw;height:100vh}
.panel{
position:fixed;top:12px;left:12px;color:white;
font-family:Arial,sans-serif;background:rgba(0,0,0,.35);
padding:10px 12px;border-radius:10px;backdrop-filter:blur(6px)
}
input{width:140px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="panel">
<div>Drag mouse to inject fluid</div>
<div>Particles: <input id="count" type="range" min="5000" max="25000" value="12000"></div>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let w,h,image;

function resize(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;
  image=ctx.createImageData(w,h);
}
resize();
addEventListener("resize",resize);

const fieldScale=0.003;
let t=0;

function noise(x,y){
  return Math.sin(x*1.7+t)+Math.cos(y*1.3-t*0.7)+Math.sin((x+y)*0.9);
}

let particles=[];
function reset(n){
  particles=[];
  for(let i=0;i<n;i++){
    particles.push({
      x:Math.random()*w,
      y:Math.random()*h,
      vx:0, vy:0,
      hue:180+Math.random()*120
    });
  }
}
reset(12000);

document.getElementById("count").oninput=e=>reset(+e.target.value);

let mouse={x:w/2,y:h/2,down:false};
canvas.onpointerdown=e=>mouse.down=true;
canvas.onpointerup=e=>mouse.down=false;
canvas.onpointermove=e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
};

function step(){
  t+=0.01;

  ctx.fillStyle="rgba(0,0,0,0.06)";
  ctx.fillRect(0,0,w,h);

  ctx.globalCompositeOperation="lighter";

  for(const p of particles){
    const nx=p.x*fieldScale;
    const ny=p.y*fieldScale;

    const a=noise(nx,ny)*2.2;

    p.vx+=Math.cos(a)*0.08;
    p.vy+=Math.sin(a)*0.08;

    if(mouse.down){
      const dx=mouse.x-p.x;
      const dy=mouse.y-p.y;
      const d=Math.hypot(dx,dy)+1;
      p.vx+=(dx/d)*0.25;
      p.vy+=(dy/d)*0.25;
      p.hue=(p.hue+0.8)%360;
    }

    p.vx*=0.985;
    p.vy*=0.985;

    const ox=p.x, oy=p.y;

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>w||p.y<0||p.y>h){
      p.x=Math.random()*w;
      p.y=Math.random()*h;
      p.vx=p.vy=0;
    }

    ctx.strokeStyle=`hsla(${p.hue},100%,65%,0.08)`;
    ctx.beginPath();
    ctx.moveTo(ox,oy);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }

  ctx.globalCompositeOperation="source-over";

  requestAnimationFrame(step);
}
step();
</script>
</body>
</html>
